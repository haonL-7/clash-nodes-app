name: Build iOS

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            aarch64-apple-ios,
            x86_64-apple-ios,
            aarch64-apple-ios-sim

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build iOS IPA
        run: cargo tauri ios build
        # Note: Requires Apple Developer certificates configured
        # Set APPLE_SIGNING_IDENTITY and APPLE_PROVISIONING_PROFILE in secrets

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: src-tauri/gen/ios/build/**/*.ipa

      - name: Upload to Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/gen/ios/build/**/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
