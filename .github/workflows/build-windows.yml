name: Build Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Package app
        run: npm run build

      - name: Create ZIP
        run: Compress-Archive -Path "release/Clash Nodes-win32-x64/*" -DestinationPath "release/ClashNodes-windows-x64.zip"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ClashNodes-Windows
          path: release/ClashNodes-windows-x64.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/ClashNodes-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
