name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: npm run build

      - run: cd release && zip -r ../ClashNodes-windows-x64.zip ./

      - uses: actions/upload-artifact@v4
        with:
          name: ClashNodes-Windows
          path: ClashNodes-windows-x64.zip

      - uses: softprops/action-gh-release@v1
        with:
          files: ClashNodes-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
