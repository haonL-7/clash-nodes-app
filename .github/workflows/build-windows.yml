name: Build Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Package app (cross-compile for Windows)
        run: npx electron-packager . "Clash Nodes" --platform=win32 --arch=x64 --out=release --overwrite --asar --prune=true

      - name: Create ZIP
        run: cd release && zip -r ../ClashNodes-windows-x64.zip "Clash Nodes-win32-x64"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ClashNodes-Windows
          path: ClashNodes-windows-x64.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ClashNodes-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
